name: OWASP Dependency Check

on:
  push:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'PortfolioAngular'
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload rapport
        uses: actions/upload-artifact@v4
        with:
          name: rapport-owasp
          path: reports/