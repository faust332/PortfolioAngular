<section class="agrandir">
  <div class="image-lightbox" *ngIf="lightboxOpen" (click)="closeImage()">
    <div class="image-lightbox-content" (click)="$event.stopPropagation()">
      <button class="lightbox-close" (click)="closeImage()">✕</button>
      <img [src]="lightboxImage" alt="Image projet agrandie" />
    </div>
  </div>
</section>
