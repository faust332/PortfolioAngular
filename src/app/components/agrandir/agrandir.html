<section class="agrandir">
  <div class="image-lightbox" *ngIf="lightboxOpen">
    <button
      type="button"
      class="image-lightbox-overlay"
      (click)="closeImage()"
      aria-label="Fermer l’aperçu">
    </button>

    <div class="image-lightbox-content">
      <img [src]="lightboxImage" alt="Projet agrandi" />
    </div>
  </div>
</section>
