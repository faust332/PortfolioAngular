<section class="agrandir">
  <div
    class="image-lightbox"
    *ngIf="lightboxOpen"
    role="button"
    tabindex="0"
    aria-label="Fermer l’aperçu"
    (click.self)="closeImage()"
    (keydown.enter)="closeImage()"
    (keydown.space)="closeImage(); $event.preventDefault()">
    <div class="image-lightbox-content">
      <img [src]="lightboxImage" alt="Projet agrandi" />
    </div>
  </div>
</section>
